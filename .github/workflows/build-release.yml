name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CUDA_VERSION: "12.5"
  CUDA_PATCH: "12.5.82"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # Download CUDA compiler + runtime as portable ZIPs (no installer = no hang)
      - name: Setup CUDA (portable redist)
        shell: pwsh
        run: |
          $cudaPath = "C:\cuda"
          New-Item -ItemType Directory -Force -Path $cudaPath | Out-Null
          $base = "https://developer.download.nvidia.com/compute/cuda/redist"
          $v = "${{ env.CUDA_PATCH }}"

          $components = @(
            "cuda_nvcc/windows-x86_64/cuda_nvcc-windows-x86_64-${v}-archive.zip",
            "cuda_cudart/windows-x86_64/cuda_cudart-windows-x86_64-${v}-archive.zip"
          )

          foreach ($comp in $components) {
            $name = $comp.Split("/")[0]
            $url = "${base}/${comp}"
            $zip = "$env:TEMP\${name}.zip"
            Write-Host "Downloading ${name}..."
            Invoke-WebRequest $url -OutFile $zip -UseBasicParsing
            $tmp = "$env:TEMP\extract_${name}"
            Expand-Archive $zip -DestinationPath $tmp -Force
            $archDir = Get-ChildItem $tmp -Directory | Select-Object -First 1
            Copy-Item "$($archDir.FullName)\*" -Destination $cudaPath -Recurse -Force
            Write-Host "  -> extracted to $cudaPath"
          }

          # Verify nvcc
          & "$cudaPath\bin\nvcc.exe" --version

          # Export for CMake
          echo "CUDA_PATH=$cudaPath" >> $env:GITHUB_ENV
          echo "$cudaPath\bin" >> $env:GITHUB_PATH

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release `
            -DNVCC_EXECUTABLE="C:/cuda/bin/nvcc.exe"

      - name: Build
        run: cmake --build build --config Release

      - name: Verify artifacts
        shell: pwsh
        run: |
          if (!(Test-Path build\Release\ManoStretch.ofx)) { throw "ManoStretch.ofx not found" }
          if (!(Test-Path build\Release\ManoStretch_Installer.exe)) { throw "Installer not found" }
          Get-Item build\Release\ManoStretch.ofx, build\Release\ManoStretch_Installer.exe | Format-Table Name, Length

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ManoStretch-Windows
          path: |
            build/Release/ManoStretch.ofx
            build/Release/ManoStretch_Installer.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ManoStretch ${{ github.ref_name }}
          body: |
            ## ManoStretch ${{ github.ref_name }} — Pixel Stretch Plugin for DaVinci Resolve

            ### Features
            - 6 stretch modes: Linear, Spiral, Wave, Taper, Smear, Shatter
            - Displacement warp algorithm — organic face-pull effect
            - Soft start blending at stretch origin
            - Post FX: global opacity, brightness, saturation (editable after drawing)
            - Liquidify: sinusoidal distortion on stretched pixels
            - Color tinting with RGB multipliers
            - Undo/redo support via stroke serialization
            - CUDA GPU acceleration with CPU fallback
            - All parameters keyframeable

            ### Downloads
            - `ManoStretch_Installer.exe` — auto-detects DaVinci Resolve and installs
            - `ManoStretch.ofx` — manual install to `C:\Program Files\Common Files\OFX\Plugins\`

            ### Requirements
            - Windows 10/11
            - DaVinci Resolve 18+ (Free or Studio)
            - NVIDIA GPU recommended (CUDA 12.x)
          files: |
            build/Release/ManoStretch.ofx
            build/Release/ManoStretch_Installer.exe
          draft: false
          prerelease: false
